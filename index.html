<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuestionario</title>

<style>
    body {
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: 40px auto;
        padding: 20px;
    }

    .pregunta {
        margin-bottom: 20px;
    }

    button {
        padding: 10px 20px;
        cursor: pointer;
    }
</style>
</head>
<body>

<h1>Cuestionario</h1>

<form id="quiz">

    <div class="pregunta">
        <p>1. ¿Cuál es la capital de México?</p>
        <label><input type="radio" name="p1" value="0"> Guadalajara</label><br>
        <label><input type="radio" name="p1" value="1"> Ciudad de México</label><br>
        <label><input type="radio" name="p1" value="0"> Monterrey</label>
    </div>

    <div class="pregunta">
        <p>2. ¿Cuánto es 5 + 3?</p>
        <label><input type="radio" name="p2" value="0"> 6</label><br>
        <label><input type="radio" name="p2" value="1"> 8</label><br>
        <label><input type="radio" name="p2" value="0"> 10</label>
    </div>

    <div class="pregunta">
        <p>3. ¿Qué lenguaje se usa para dar estilo a una página web?</p>
        <label><input type="radio" name="p3" value="0"> HTML</label><br>
        <label><input type="radio" name="p3" value="1"> CSS</label><br>
        <label><input type="radio" name="p3" value="0"> SQL</label>
    </div>

    <button type="button" onclick="calificar()">
        Enviar respuestas
    </button>

</form>

<h2 id="resultado"></h2>

<script>
function calificar() {
    let puntos = 0;

    const respuestas = document.querySelectorAll('input[type="radio"]:checked');

    respuestas.forEach(respuesta => {
        puntos += parseInt(respuesta.value);
    });

    document.getElementById("resultado").textContent =
        `Obtuviste ${puntos} de 3 puntos.`;
}
</script>

</body>
</html>
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería de Imágenes</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
        background-color: #f4f4f4;
    }

    h1 {
        text-align: center;
    }

    .galeria {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 15px;
    }

    .galeria img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: 10px;
        transition: transform 0.3s;
        cursor: pointer;
    }

    .galeria img:hover {
        transform: scale(1.05);
    }
</style>
</head>
<body>

<h1>Mi Galería</h1>

<div class="galeria">
    <img src="imagen1.jpg" alt="Imagen 1">
    <img src="imagen2.jpg" alt="Imagen 2">
    <img src="imagen3.jpg" alt="Imagen 3">
    <img src="imagen4.jpg" alt="Imagen 4">
    <img src="imagen5.jpg" alt="Imagen 5">
    <img src="imagen6.jpg" alt="Imagen 6">
</div>

</body>
</html>
<script>
document.querySelectorAll('.galeria img').forEach(img => {
    img.addEventListener('click', () => {
        window.open(img.src, '_blank');
    });
});
</script>
