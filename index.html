<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Página Web</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #0077b6;
            color: white;
            text-align: center;
            padding: 20px;
        }

        nav {
            background-color: #023e8a;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 15px;
            font-weight: bold;
        }

        section {
            background-color: white;
            margin: 20px;
            padding: 20px;
            border-radius: 10px;
        }

        footer {
            background-color: #222;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>

<body>

    <!-- Encabezado -->
    <header>
        <h1>Mi Página Web</h1>
        <p>Bienvenido a mi sitio personal</p>
    </header>

    <!-- Menú -->
    <nav>
        <a href="#">Inicio</a>
        <a href="#">Sobre mí</a>
        <a href="#">Proyectos</a>
        <a href="#">Contacto</a>
    </nav>

    <!-- Contenido principal -->
    <section>
        <h2>Sobre mí</h2>
        <p>
            Hola, mi nombre es Oscar y estoy aprendiendo
            desarrollo web con HTML, CSS y JavaScript.
        </p>
    </section>

    <section>
        <h2>Mis proyectos</h2>
        <p>
            Aquí podrás ver algunos proyectos escolares
            y personales.
        </p>
    </section>

    <!-- Pie de página -->
    <footer>
        <p>2026 - Página creada por Oscar</p>
    </footer>

</body>

</html>
