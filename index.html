<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proyecto Completo</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
        background-color: #f4f4f4;
        color: #000;
        transition: all 0.3s ease;
    }

    /* Modo oscuro */
    body.dark {
        background-color: #121212;
        color: white;
    }

    #toggle-theme {
        padding: 10px 20px;
        margin-bottom: 20px;
        cursor: pointer;
    }

    .pregunta {
        margin-bottom: 20px;
    }

    button {
        padding: 10px 20px;
        cursor: pointer;
    }

    .galeria {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 15px;
        margin-top: 30px;
    }

    .galeria img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: 10px;
        transition: transform 0.3s;
        cursor: pointer;
    }

    .galeria img:hover {
        transform: scale(1.05);
    }
</style>
</head>
<body>

<!-- Modo Oscuro -->
<button id="toggle-theme">🌙 Modo Oscuro</button>

<h1>Hola Mundo</h1>
<p>Este es un ejemplo de modo oscuro.</p>

<hr>

<!-- Cuestionario -->
<h1>Cuestionario</h1>

<form id="quiz">

    <div class="pregunta">
        <p>1. ¿Cuál es la capital de México?</p>
        <label><input type="radio" name="p1" value="0"> Guadalajara</label><br>
        <label><input type="radio" name="p1" value="1"> Ciudad de México</label><br>
        <label><input type="radio" name="p1" value="0"> Monterrey</label>
    </div>

    <div class="pregunta">
        <p>2. ¿Cuánto es 5 + 3?</p>
        <label><input type="radio" name="p2" value="0"> 6</label><br>
        <label><input type="radio" name="p2" value="1"> 8</label><br>
        <label><input type="radio" name="p2" value="0"> 10</label>
    </div>

    <div class="pregunta">
        <p>3. ¿Qué lenguaje se usa para dar estilo a una página web?</p>
        <label><input type="radio" name="p3" value="0"> HTML</label><br>
        <label><input type="radio" name="p3" value="1"> CSS</label><br>
        <label><input type="radio" name="p3" value="0"> SQL</label>
    </div>

    <button type="button" onclick="calificar()">
        Enviar respuestas
    </button>

</form>

<h2 id="resultado"></h2>

<hr>

<!-- Galería -->
<h1>Mi Galería</h1>

<div class="galeria">
    <img src="https://picsum.photos/id/1015/600/400" alt="Imagen 1">
    <img src="https://picsum.photos/id/1025/600/400" alt="Imagen 2">
    <img src="https://picsum.photos/id/1035/600/400" alt="Imagen 3">
    <img src="https://picsum.photos/id/1045/600/400" alt="Imagen 4">
    <img src="https://picsum.photos/id/1055/600/400" alt="Imagen 5">
    <img src="https://picsum.photos/id/1065/600/400" alt="Imagen 6">
</div>

<script>
    // Modo oscuro
    const toggleBtn = document.getElementById("toggle-theme");

    toggleBtn.addEventListener("click", () => {
        document.body.classList.toggle("dark");

        if (document.body.classList.contains("dark")) {
            toggleBtn.textContent = "☀️ Modo Claro";
        } else {
            toggleBtn.textContent = "🌙 Modo Oscuro";
        }
    });

    // Cuestionario
    function calificar() {
        let puntos = 0;

        const respuestas = document.querySelectorAll(
            'input[type="radio"]:checked'
        );

        respuestas.forEach(respuesta => {
            puntos += parseInt(respuesta.value);
        });

        document.getElementById("resultado").textContent =
            `Obtuviste ${puntos} de 3 puntos.`;
    }

    // Galería
    document.querySelectorAll('.galeria img').forEach(img => {
        img.addEventListener('click', () => {
            window.open(img.src, '_blank');
        });
    });
</script>

</body>
</html>
